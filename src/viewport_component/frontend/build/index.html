<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dogether Viewport Info</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: transparent;
        color: #111827;
      }

    </style>
  </head>
  <body>
    <script>
      const COMPONENT_READY = "streamlit:componentReady";
      const RENDER_EVENT = "streamlit:render";
      const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
      const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";

      const DEFAULT_RESIZE_PIXEL_THRESHOLD = 10;
      const DEFAULT_RESIZE_DEBOUNCE_MS = 300;

      let args = {};
      let lastReportedPayload = null;
      let resizeTimer = null;

      function sendMessage(type, data) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...data,
          },
          "*"
        );
      }

      function setFrameHeight(height) {
        sendMessage(SET_FRAME_HEIGHT, { height });
      }

      function setComponentValue(value) {
        sendMessage(SET_COMPONENT_VALUE, { value });
      }

      function currentWindowSize(targetWindow) {
        const targetDocument = targetWindow.document;
        return {
          width: targetWindow.innerWidth || targetDocument.documentElement.clientWidth || 0,
          height: targetWindow.innerHeight || targetDocument.documentElement.clientHeight || 0,
        };
      }

      function browserViewportSize() {
        const iframe = currentWindowSize(window);

        try {
          if (window.parent && window.parent !== window) {
            return {
              ...currentWindowSize(window.parent),
              source: "parent_window",
              iframeWidth: iframe.width,
              iframeHeight: iframe.height,
            };
          }
        } catch (error) {
          return {
            ...iframe,
            source: "iframe_fallback_parent_blocked",
            iframeWidth: iframe.width,
            iframeHeight: iframe.height,
          };
        }

        return {
          ...iframe,
          source: "iframe",
          iframeWidth: iframe.width,
          iframeHeight: iframe.height,
        };
      }

      function numericArg(name, fallback) {
        const value = Number(args[name]);
        return Number.isFinite(value) && value >= 0 ? value : fallback;
      }

      function pixelThreshold() {
        return numericArg("pixel_threshold", DEFAULT_RESIZE_PIXEL_THRESHOLD);
      }

      function debounceMs() {
        return numericArg("debounce_ms", DEFAULT_RESIZE_DEBOUNCE_MS);
      }

      function detectedDevicePlatform() {
        const userAgent = navigator.userAgent || "";
        const platform = navigator.platform || "";
        const hasTouch = navigator.maxTouchPoints && navigator.maxTouchPoints > 1;

        if (/Android/i.test(userAgent)) {
          return "android";
        }
        if (/iPhone|iPad|iPod/i.test(userAgent)) {
          return "ios";
        }
        if (/Macintosh/i.test(userAgent) && /Mac/i.test(platform) && hasTouch) {
          return "ios";
        }
        return "pc";
      }

      function devicePlatform() {
        try {
          return detectedDevicePlatform();
        } catch (error) {
          return "all";
        }
      }

      function viewportPayload() {
        const viewport = browserViewportSize();
        const width = viewport.width;
        const height = viewport.height;
        const aspectRatio = height > 0 ? width / height : null;
        let orientation = "square";

        if (aspectRatio !== null && aspectRatio < 1) {
          orientation = "portrait";
        } else if (aspectRatio !== null && aspectRatio > 1) {
          orientation = "landscape";
        }

        return {
          width,
          height,
          iframeWidth: viewport.iframeWidth,
          iframeHeight: viewport.iframeHeight,
          viewportSource: viewport.source,
          screenWidth: window.screen ? window.screen.width : null,
          screenHeight: window.screen ? window.screen.height : null,
          devicePixelRatio: window.devicePixelRatio || 1,
          aspectRatio,
          orientation,
          renderPath: aspectRatio !== null && aspectRatio < 1 ? "mobile_portrait" : "widescreen",
          devicePlatform: devicePlatform(),
          userAgent: navigator.userAgent,
          timestamp: new Date().toISOString(),
        };
      }

      function shouldReportPayload(payload) {
        if (lastReportedPayload === null) {
          return true;
        }

        const widthDelta = Math.abs(payload.width - lastReportedPayload.width);
        const heightDelta = Math.abs(payload.height - lastReportedPayload.height);
        const threshold = pixelThreshold();
        return (
          widthDelta > threshold ||
          heightDelta > threshold ||
          payload.orientation !== lastReportedPayload.orientation ||
          payload.devicePlatform !== lastReportedPayload.devicePlatform
        );
      }

      function reportViewport() {
        const payload = viewportPayload();

        if (!shouldReportPayload(payload)) {
          return;
        }

        setFrameHeight(1);
        lastReportedPayload = payload;
        setComponentValue(payload);
      }

      function debounceReportViewport() {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(reportViewport, debounceMs());
      }

      window.addEventListener("message", (event) => {
        if (event.data.type !== RENDER_EVENT) {
          return;
        }
        args = event.data.args || {};
        reportViewport();
      });

      window.addEventListener("resize", debounceReportViewport);
      window.addEventListener("orientationchange", debounceReportViewport);

      sendMessage(COMPONENT_READY, { apiVersion: 1 });
      reportViewport();
    </script>
  </body>
</html>
