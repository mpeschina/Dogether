<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dogether Push Subscribe</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        color: #111827;
        background: transparent;
      }

      .push-shell {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        padding: 0.25rem 0;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        font: inherit;
        min-height: 2.35rem;
        padding: 0.45rem 0.8rem;
      }

      button.primary {
        background: #15803d;
        border-color: #15803d;
        color: #ffffff;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #status {
        flex-basis: 100%;
        color: #4b5563;
        font-size: 0.9rem;
        line-height: 1.35;
        margin: 0.1rem 0 0;
      }
    </style>
  </head>
  <body>
    <div class="push-shell">
      <button class="primary" id="enable" type="button">Enable notifications</button>
      <button id="disable" type="button">Disable notifications</button>
      <p id="status"></p>
    </div>

    <script>
      const COMPONENT_READY = "streamlit:componentReady";
      const RENDER_EVENT = "streamlit:render";
      const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
      const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";

      let args = {};

      function sendMessage(type, data) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...data,
          },
          "*"
        );
      }

      function setFrameHeight(height) {
        sendMessage(SET_FRAME_HEIGHT, { height });
      }

      function setComponentValue(value) {
        sendMessage(SET_COMPONENT_VALUE, { value });
      }

      function setStatus(message) {
        document.getElementById("status").textContent = message || "";
        setFrameHeight(document.body.scrollHeight + 8);
      }

      function setBusy(isBusy) {
        document.getElementById("enable").disabled = isBusy;
        document.getElementById("disable").disabled = isBusy;
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);

        for (let i = 0; i < rawData.length; i += 1) {
          outputArray[i] = rawData.charCodeAt(i);
        }

        return outputArray;
      }

      async function enablePush() {
        setBusy(true);
        try {
          if (!("Notification" in window)) {
            throw new Error("Notifications are not supported in this browser.");
          }
          if (!("serviceWorker" in navigator)) {
            throw new Error("Service workers are not supported in this browser.");
          }
          if (!("PushManager" in window)) {
            throw new Error("Push API is not supported in this browser.");
          }
          if (!args.vapid_public_key) {
            throw new Error("Push notifications are not configured.");
          }

          const permission = await Notification.requestPermission();
          if (permission !== "granted") {
            throw new Error("Notification permission was not granted.");
          }

          const serviceWorkerUrl = args.service_worker_url || "/app/static/sw.js";
          const registration = await navigator.serviceWorker.register(serviceWorkerUrl);
          let subscription = await registration.pushManager.getSubscription();

          if (!subscription) {
            subscription = await registration.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(args.vapid_public_key),
            });
          }

          setComponentValue({
            ok: true,
            permission,
            subscription: subscription.toJSON(),
            userAgent: navigator.userAgent,
          });
          setStatus("Push notifications enabled.");
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setComponentValue({ ok: false, error: message });
          setStatus("Error: " + message);
        } finally {
          setBusy(false);
        }
      }

      async function disablePush() {
        setBusy(true);
        try {
          const registration = await navigator.serviceWorker.getRegistration(
            args.service_worker_url || "/app/static/sw.js"
          );
          if (!registration) {
            setStatus("No service worker registration found.");
            return;
          }

          const subscription = await registration.pushManager.getSubscription();
          if (!subscription) {
            setStatus("No active subscription found.");
            return;
          }

          const endpoint = subscription.endpoint;
          await subscription.unsubscribe();
          setComponentValue({ ok: true, unsubscribe: true, endpoint });
          setStatus("Push notifications disabled.");
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setComponentValue({ ok: false, error: message });
          setStatus("Error: " + message);
        } finally {
          setBusy(false);
        }
      }

      window.addEventListener("message", (event) => {
        if (event.data.type !== RENDER_EVENT) {
          return;
        }
        args = event.data.args || {};
        setFrameHeight(document.body.scrollHeight + 8);
      });

      document.getElementById("enable").addEventListener("click", enablePush);
      document.getElementById("disable").addEventListener("click", disablePush);
      sendMessage(COMPONENT_READY, { apiVersion: 1 });
      setFrameHeight(document.body.scrollHeight + 8);
    </script>
  </body>
</html>
